<p-toast position="top-center" [style]="{ width: '300px' }">
    <ng-template let-message pTemplate="message">
        <div class="custom-toast">
            @if (message.severity === 'success') {
                <i class="fa-light fa-thumbs-up custom-toast-icon"></i>
            } @else {
                <i class="fa-sharp fa-light fa-circle-exclamation custom-toast-icon"></i>
            }
            <div class="toast-text">
                <span class="toast-summary">{{ message.summary }}</span>
                @if (message.detail) {
                    <span class="toast-detail">{{ message.detail }}</span>
                }
            </div>
        </div>
    </ng-template>
</p-toast>
<router-outlet />
