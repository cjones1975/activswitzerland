<section class="nav-section">
    <span class="nav-label">{{ 'nav.navigation' | translate }}</span>
    <ul class="nav-list">
        <li class="nav-item" routerLink="/" (click)="closeMenu()">
            <div class="nav-icon-box"><i class="fa-light fa-house"></i></div>
            <span class="nav-item-label">{{ 'nav.home' | translate }}</span>
            <i class="pi pi-chevron-right nav-chevron"></i>
        </li>
        <li class="nav-item" routerLink="/search" (click)="closeMenu()">
            <div class="nav-icon-box"><i class="fa-light fa-magnifying-glass"></i></div>
            <span class="nav-item-label">{{ 'nav.search' | translate }}</span>
            <i class="pi pi-chevron-right nav-chevron"></i>
        </li>
        <li class="nav-item" routerLink="/explore-trips" (click)="closeMenu()">
            <div class="nav-icon-box"><i class="fa-light fa-compass"></i></div>
            <span class="nav-item-label">{{ 'nav.exploreTrips' | translate }}</span>
            <i class="pi pi-chevron-right nav-chevron"></i>
        </li>
        <li class="nav-item" routerLink="/trip-planner" (click)="closeMenu()">
            <div class="nav-icon-box"><i class="fa-light fa-route"></i></div>
            <span class="nav-item-label">{{ 'nav.tripplanner' | translate }}</span>
            <i class="pi pi-chevron-right nav-chevron"></i>
        </li>
        @if (auth.isLoggedIn()) {
            <li class="nav-item" routerLink="/auth/profile" (click)="closeMenu()">
                <div class="nav-icon-box"><i class="fa-light fa-circle-user"></i></div>
                <span class="nav-item-label">{{ 'nav.profile' | translate }}</span>
                <i class="pi pi-chevron-right nav-chevron"></i>
            </li>
        }
    </ul>
</section>

<div class="nav-actions">
    <button class="login-btn" type="button" (click)="onAuthAction()">
        <i [class]="auth.isLoggedIn() ? 'pi pi-sign-out' : 'pi pi-sign-in'"></i>
        <span>{{ (auth.isLoggedIn() ? 'nav.logout' : 'nav.login') | translate }}</span>
        <i class="pi pi-chevron-right"></i>
    </button>
</div>

<div class="lang-selector">
    <p-select
        [options]="languages"
        [(ngModel)]="selectedLang"
        optionLabel="label"
        optionValue="value"
        (onChange)="changeLanguage($event.value)"
        class="lang-select"
    />
</div>
