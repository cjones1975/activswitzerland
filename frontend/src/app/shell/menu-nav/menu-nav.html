<section class="nav-section">
    <span class="nav-label">{{ 'nav.navigation' | translate }}</span>
    <ul class="nav-list">
        <li class="nav-item">
            <div class="nav-icon-box"><i class="pi pi-home"></i></div>
            <span class="nav-item-label">{{ 'nav.home' | translate }}</span>
            <i class="pi pi-chevron-right nav-chevron"></i>
        </li>
        <li class="nav-item">
            <div class="nav-icon-box"><i class="pi pi-compass"></i></div>
            <span class="nav-item-label">{{ 'nav.explore' | translate }}</span>
            <i class="pi pi-chevron-right nav-chevron"></i>
        </li>
        <li class="nav-item">
            <div class="nav-icon-box"><i class="pi pi-map"></i></div>
            <span class="nav-item-label">{{ 'nav.mapplanner' | translate }}</span>
            <i class="pi pi-chevron-right nav-chevron"></i>
        </li>
    </ul>
</section>

<div class="nav-actions">
    <button class="login-btn" type="button">
        <i class="pi pi-sign-in"></i>
        <span>Log In</span>
        <i class="pi pi-chevron-right"></i>
    </button>
</div>

<div class="lang-selector">
    <p-select
        [options]="languages"
        [(ngModel)]="selectedLang"
        optionLabel="label"
        optionValue="value"
        (onChange)="changeLanguage($event.value)"
        class="lang-select"
    />
</div>
