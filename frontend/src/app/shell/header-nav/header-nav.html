<p-menubar class="header-nav">
  <ng-template #start>
    <span class="brand">ActivSwitzerland</span>
  </ng-template>

  <ng-template #end>
    <p-button
      icon="pi pi-bars"
      [text]="true"
      severity="contrast"
      aria-label="Toggle menu"
      class="toggle-btn"
      (onClick)="toggleMenu()"
    />
  </ng-template>
</p-menubar>
