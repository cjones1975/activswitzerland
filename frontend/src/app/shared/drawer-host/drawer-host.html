<!-- MENU NAV -->
<p-drawer
    [visible]="svc.isOpen('menu-nav')"
    [closable]="false"
    (visibleChange)="onVisibleChange('menu-nav', $event)"
    position="left"
    appendTo="body"
    [baseZIndex]="svc.zIndexFor('menu-nav')"
    [style]="{ width: '300px' }">
    <ng-template #header>
        <div class="menu-header">
            <div class="menu-brand">
                <div class="menu-avatar">
                    <i class="pi pi-map-marker"></i>
                </div>
                <div class="menu-brand-text">
                    <span class="menu-brand-name">ActivSwitzerland</span>
                    <span class="menu-brand-tagline">{{ 'nav-drawer.subtitle' | translate }}</span>
                </div>
            </div>
            <button class="menu-close" type="button" (click)="onDrawerClose('menu-nav')">
                <i class="pi pi-times"></i>
            </button>
        </div>
    </ng-template>
    <app-menu-nav></app-menu-nav>
</p-drawer>

<!-- AUTH -->
<p-drawer
    [visible]="svc.isOpen('auth')"
    [closable]="false"
    (visibleChange)="onVisibleChange('auth', $event)"
    position="right"

    [baseZIndex]="svc.zIndexFor('auth')"

    <ng-template #header>
        <div class="menu-header">
            <div class="menu-brand">
                <div class="menu-avatar">
                    <i class="fa-light fa-lock"></i>
                </div>
                <div class="menu-brand-text">
                    <span class="menu-brand-name">ActivSwitzerland</span>
                </div>
            </div>
            <button class="menu-close" type="button" (click)="onDrawerClose('auth')">
                <i class="pi pi-times"></i>
            </button>
        </div>
    </ng-template>
    <app-auth-layout></app-auth-layout>
</p-drawer>

<!-- ALL ATTRACTIONS -->
<p-drawer
    [visible]="svc.isOpen('all-attractions')"
    [closable]="false"
    [dismissible]="false"
    [closeOnEscape]="false"
    (visibleChange)="onVisibleChange('all-attractions', $event)"
    position="left"
    appendTo="body"
    [baseZIndex]="svc.zIndexFor('all-attractions')"
    [style]="{ width: 'min(600px, calc(100vw - 20px))' }"
    styleClass="dest-drawer">
    <ng-template #header>
        <div class="dest-header">
            <button class="dest-back" type="button" (click)="onAllAttractionsBack()">
                <i class="fa-sharp fa-solid fa-circle-arrow-left"></i>
                {{ 'attractions.backToDestination' | translate }}
            </button>
            <button class="menu-close" type="button" (click)="onCollapse('all-attractions')">
                <i class="fa-regular fa-map-location"></i>
            </button>
        </div>
    </ng-template>
    <app-all-attractions></app-all-attractions>
</p-drawer>
