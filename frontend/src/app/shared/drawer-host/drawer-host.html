<!-- MENU NAV -->
<p-drawer
    [visible]="svc.isOpen('menu-nav')"
    [closable]="false"
    (visibleChange)="onVisibleChange('menu-nav', $event)"
    position="left"
    appendTo="body"
    [baseZIndex]="svc.zIndexFor('menu-nav')"
    [style]="{ width: '300px' }">
    <ng-template #header>
        <div class="menu-header">
            <div class="menu-brand">
                <div class="menu-avatar">
                    <i class="pi pi-map-marker"></i>
                </div>
                <div class="menu-brand-text">
                    <span class="menu-brand-name">ActivSwitzerland</span>
                    <span class="menu-brand-tagline">{{ 'nav-drawer.subtitle' | translate }}</span>
                </div>
            </div>
            <button class="menu-close" type="button" [attr.aria-label]="'nav.close' | translate" (click)="onDrawerClose('menu-nav')">
                <i class="pi pi-times"></i>
            </button>
        </div>
    </ng-template>
    <app-menu-nav></app-menu-nav>
</p-drawer>

        </div>
    </ng-template>

<!-- ALL ATTRACTIONS -->
<p-drawer
    [visible]="svc.isOpen('all-attractions')"
    [closable]="false"
    [dismissible]="false"
    [closeOnEscape]="false"
    (visibleChange)="onVisibleChange('all-attractions', $event)"
    position="left"
    appendTo="body"
    [baseZIndex]="svc.zIndexFor('all-attractions')"
    [style]="{ width: 'min(600px, calc(100vw - 20px))' }"
    styleClass="dest-drawer">
    <ng-template #header>
        <div class="dest-header">
            <button class="dest-back" type="button" (click)="onAllAttractionsBack()">
                <i class="fa-sharp fa-solid fa-circle-arrow-left"></i>
                {{ 'attractions.backToDestination' | translate: { name: allAttractionsDestinationName() } }}
            </button>
            <button class="menu-close" type="button" [attr.aria-label]="'nav.showOnMap' | translate" (click)="onCollapse('all-attractions')">
                <i class="fa-regular fa-map-location"></i>
            </button>
        </div>
    </ng-template>
    <hr class="header-divider" />
    <app-all-attractions></app-all-attractions>
</p-drawer>

<!-- ATTRACTION DETAIL -->
<p-drawer
    [visible]="svc.isOpen('attraction-detail')"
    [closable]="false"
    [dismissible]="false"
    [closeOnEscape]="false"
    (visibleChange)="onVisibleChange('attraction-detail', $event)"
    position="left"
    appendTo="body"
    [baseZIndex]="svc.zIndexFor('attraction-detail')"
    [style]="{ width: 'min(600px, calc(100vw - 20px))' }"
    styleClass="dest-drawer">
    <ng-template #header>
        <div class="dest-header">
            <button class="dest-back" type="button" (click)="onAttractionDetailBack()">
                <i class="fa-sharp fa-solid fa-circle-arrow-left"></i>
                @if (attractionDetailSource() === 'things-to-do') {
                    {{ 'trip.planner.thingsToDo.backToList' | translate }}
                } @else if (attractionDetailSource() === 'trip-planner') {
                    {{ 'trip.planner.backToPlanner' | translate }}
                } @else {
                    {{ 'attractions.backToAttractions' | translate }}
                }
            </button>
            <button class="menu-close" type="button" [attr.aria-label]="'nav.showOnMap' | translate" (click)="onCollapse('attraction-detail')">
                <i class="fa-regular fa-map-location"></i>
            </button>
        </div>
    </ng-template>
    <hr class="header-divider" />
    <app-attraction-detail></app-attraction-detail>
</p-drawer>

<!-- WEATHER -->
<p-drawer
    [visible]="svc.isOpen('weather')"
    [closable]="false"
    [dismissible]="false"
    [closeOnEscape]="false"
    (visibleChange)="onVisibleChange('weather', $event)"
    position="left"
    appendTo="body"
    [baseZIndex]="svc.zIndexFor('weather')"
    [style]="{ width: 'min(600px, 100vw)' }"
    styleClass="dest-drawer">
    <ng-template #header>
        <div class="weather-drawer-header">
            <div class="weather-drawer-top-row">
                <button class="menu-close" type="button" [attr.aria-label]="'nav.close' | translate" (click)="onWeatherBack()">
                    <i class="fa-regular fa-chevron-left"></i>
                </button>
                <!-- <button class="dest-back" type="button" (click)="onWeatherBack()">
                    <i class="fa-sharp fa-solid fa-circle-arrow-left"></i>
                    {{ 'weather.backToDestination' | translate }}
                </button>    -->
            </div>
            <h2 class="weather-location-name">{{ weatherLocationName() }}</h2>
            <span class="weather-forecast-label">7-DAY FORECAST</span>
        </div>
    </ng-template>
    <hr class="header-divider" />
    <app-weather></app-weather>
</p-drawer>
