<svg class="trail-thumb" viewBox="0 0 100 60" preserveAspectRatio="xMidYMid meet">
  <rect class="trail-thumb-bg" x="0" y="0" width="100" height="60" rx="6" />
  @for (line of lines; track $index) {
    <polyline
      [attr.points]="line"
      fill="none"
      [attr.stroke]="color"
      stroke-width="2.2"
      stroke-linecap="round"
      stroke-linejoin="round" />
  }
</svg>
