<section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="hero-body">
            <span class="hero-badge">
                <i class="pi pi-map-marker"></i>
                {{ 'hero.badge' | translate }}
            </span>
            <h1 class="hero-title">{{ 'hero.title' | translate }}</h1>
            <p class="hero-subtitle">{{ 'hero.subtitle' | translate }}</p>
            <button class="hero-cta" type="button" (click)="openTripPlanner()">
                {{ 'hero.cta' | translate }}
              <i class="fa-regular fa-chevron-right"></i>
            </button>
        </div>
        <div class="hero-stats">
            <div class="hero-stat">
                <span class="stat-value">1400+</span>
                <span class="stat-label">{{ 'hero.stats.attractions' | translate }}</span>
            </div>
            <div class="stat-divider"></div>
            <div class="hero-stat">
                <span class="stat-value">26</span>
                <span class="stat-label">{{ 'hero.stats.cantons' | translate }}</span>
            </div>
            <div class="stat-divider"></div>
            <div class="hero-stat">
                <span class="stat-value">13</span>
                <span class="stat-label">{{ 'hero.stats.unesco' | translate }}</span>
            </div>
        </div>
    </div>
</section>
<div class="home-search-wrap">
  <app-search-box (search)="onSearch($event)"></app-search-box>
</div>
<div class="home-section">
  <div class="section-inner">
    <app-destination-horizontal-list
      cardTitle="City"
      title="destinations.cityBreaks.title"
      subTitle="destinations.cityBreaks.subtitle"
      facet="placetypes:cities"
      categoryKey="cities"
      viewAllRoute="/destinations"
      [viewAllQueryParams]="{ category: 'cities' }">
    </app-destination-horizontal-list>
  </div>
</div>
<div class="home-section home-section--gray">
  <div class="section-inner">
    <app-destination-horizontal-list
      cardTitle="Mountain"
      title="destinations.mountains.title"
      subTitle="destinations.mountains.subtitle"
      facet="[placetypes:mountains,placetypes:mountainpasses,placetypes:glaciers,placetypes:mountainlakes,placetypes:smalllakes,placetypes:biglakes,placetypes:lakes]"
      categoryKey="mountains-lakes"
      viewAllRoute="/destinations"
      [viewAllQueryParams]="{ category: 'mountains-lakes' }">
    </app-destination-horizontal-list>
  </div>
</div>
<div class="home-section">
  <div class="section-inner">
    <app-destination-horizontal-list
      cardTitle="Nature Park"
      title="destinations.natureParks.title"
      subTitle="destinations.natureParks.subtitle"
      facet="[placetypes:natureparks,placetypes:wildlifeparks]"
      categoryKey="nature-parks"
      viewAllRoute="/destinations"
      [viewAllQueryParams]="{ category: 'nature-parks' }">
    </app-destination-horizontal-list>
  </div>
</div>
