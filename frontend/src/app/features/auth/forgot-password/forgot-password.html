<app-header-nav></app-header-nav>

<div class="fp-page">

    <div class="fp-hero">
        <div class="fp-icon-circle">
            <i class="fa-light fa-key"></i>
        </div>
        <h1 class="fp-title">{{ 'forgot.title' | translate }}</h1>
        <p class="fp-subtitle">{{ 'forgot.subtitle' | translate }}</p>
    </div>

    <div class="fp-card">
        <form [formGroup]="form" (ngSubmit)="form.valid">

            <div class="field">
                <label class="field-label">{{ 'forgot.email_label' | translate }}</label>
                <div class="input-wrap">
                    <i class="fa-sharp fa-light fa-envelope input-icon"></i>
                    <input
                        class="field-input"
                        type="email"
                        formControlName="email"
                        [placeholder]="'forgot.email_placeholder' | translate"
                        [class.invalid]="form.controls.email.invalid && form.controls.email.touched"
                    />
                </div>
            </div>

            <button class="submit-btn" type="submit" [disabled]="form.invalid || submitting()">
                {{ submitting() ? ('forgot.sending' | translate) : ('forgot.submit' | translate) }}
            </button>

        </form>

        <a class="back-link" routerLink="/auth">{{ 'forgot.back' | translate }}</a>
    </div>

</div>
