<div class="all-attractions-panel">
  <div class="card-list">
    @for (attraction of attractions; track attraction.identifier) {
      <div class="attraction-card" (click)="onAttractionClick(attraction)">
        <div class="card-photo" [style.background-image]="'url(' + attraction.photo + ')'"></div>
        <div class="card-text">
          <h3 class="card-name">{{ attraction.name }}</h3>
          <p class="card-abstract">{{ attraction.abstract }}</p>
        </div>
      </div>
    }

    @if (loading()) {
      @for (s of skeletons; track $index) {
        <div class="skeleton-card">
          <p-skeleton width="100%" height="100%" borderRadius="10px" />
        </div>
      }
    }

    <div #sentinel class="sentinel"></div>
  </div>
</div>
