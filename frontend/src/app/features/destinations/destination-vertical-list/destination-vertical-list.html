<div class="page-content">
  <a class="back-link" routerLink="/" [attr.aria-label]="'nav.back' | translate">
    <i class="fa-solid fa-chevron-left"></i>
  </a>

  <div class="map-section" #mapSection>
    <app-map [markers]="mapMarkers()" [zoom]="6" (markerClick)="onMarkerClick($event)"></app-map>
  </div>

  <div class="list-header">
    <h1 class="list-title">{{ config().title | translate }}</h1>
    <p class="list-subtitle">{{ config().pageSubtitle | translate: { count: destinations.length } }}</p>
  </div>

  <div class="card-list">
    @if (loading()) {
      @for (s of skeletons; track $index) {
        <div class="skeleton-card">
          <p-skeleton width="100%" height="100%" borderRadius="12px" />
        </div>
      }
    } @else {
      @for (dest of destinations; track dest.identifier) {
        <a class="destination-card" [routerLink]="['/destinations', dest.identifier]" [queryParams]="{ category: categoryKey() }">
          <div class="card-photo" [style.background-image]="'url(' + dest.photo + ')'">
            <span class="card-type">{{ config().cardTitle }}</span>
            <span class="card-name">{{ dest.name }}</span>
          </div>
          <div class="card-text">
            <p class="card-abstract">{{ dest.abstract }}</p>
          </div>
        </a>
      }
    }
  </div>
</div>
