@if (destination(); as dest) {
  <div class="detail-panel">

    <h1 class="dest-name">{{ dest.name }}</h1>

    @if (dest.image?.length) {
      <div class="galleria-wrap">
        <p-galleria
          [value]="dest.image!"
          [circular]="true"
          [showItemNavigators]="dest.image!.length > 1"
          [showThumbnails]="dest.image!.length > 1"
          [numVisible]="4">
          <ng-template #item let-img>
            <div class="galleria-img" [style.background-image]="'url(' + img.url + ')'"></div>
          </ng-template>
          <ng-template #thumbnail let-img>
            <div class="galleria-thumb" [style.background-image]="'url(' + img.url + ')'"></div>
          </ng-template>
        </p-galleria>
      </div>
    } @else {
      <div class="galleria-wrap">
        <div class="galleria-img" [style.background-image]="'url(' + dest.photo + ')'"></div>
      </div>
    }

    <div class="tourism-link">
      <a [href]="dest.url" target="_blank" rel="noopener">Switzerland Tourism</a>
    </div>

    <div class="content">
      <p class="abstract" [innerHTML]="dest.abstract"></p>

      <div class="action-grid">
        <button class="plan-btn" type="button">
          <i class="fa-solid fa-route"></i>
          {{ 'destinations.detail.planTrip' | translate }}
        </button>
        <div class="weather-box">
          <i class="fa-solid fa-sun weather-icon"></i>
          <span class="weather-temp">--°C</span>
        </div>
      </div>
    </div>

  </div>
}
